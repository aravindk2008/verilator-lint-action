name: "Verilator Lint Action"
description: "Runs lint checks on SystemVerilog files"

inputs:
  files:
    description: "Space-separated list of .sv files"
    required: true

  severity:
    description: "Lint severity level"
    required: false
    default: "warning"

outputs:
  result:
    description: "JSON lint result"

runs:
  using: "composite"

  steps:
    - name: Run Lint Script
      shell: bash
      run: |
        python ${{ github.action_path }}/run.py "${{ inputs.files }}" "${{ inputs.severity }}"
